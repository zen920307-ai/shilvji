<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#0e0e0e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>食旅集 · DESIGN BY ZEN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div id="app">
      <div class="zen-strip">
        <span class="zen-mark"><i>DESIGN BY</i> ZEN</span>
        <span class="zen-side">旅人的菜单册</span>
      </div>

      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">SLJ</span>
          <div class="brand-text">
            <h1 class="brand-title">食旅集</h1>
            <p class="brand-sub">Taste · Translate · Travel</p>
          </div>
        </div>
        <div class="topbar-actions">
          <button type="button" class="icon-btn" id="btn-history" aria-label="点单记录" title="点单记录">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 6h16M4 12h12M4 18h14" stroke-linecap="square" />
            </svg>
          </button>
          <button type="button" class="icon-btn" id="btn-settings" aria-label="设置" title="API 设置">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7" />
              <rect x="14" y="3" width="7" height="7" />
              <rect x="3" y="14" width="7" height="7" />
              <rect x="14" y="14" width="7" height="7" />
            </svg>
          </button>
        </div>
      </header>

      <main id="main" class="main"></main>

      <div id="cart-bar" class="cart-bar hidden" aria-live="polite">
        <div class="cart-bar-inner">
          <div class="cart-info">
            <div class="cart-badge-wrap">
              <span class="cart-icon">已选</span>
              <span id="cart-count" class="cart-count">0</span>
            </div>
            <div class="cart-totals">
              <span id="cart-total" class="cart-total">¥0.00</span>
              <span id="cart-total-orig" class="cart-total-orig"></span>
            </div>
          </div>
          <button type="button" id="btn-checkout" class="btn-primary cart-confirm">生成点单卡</button>
        </div>
      </div>
    </div>

    <div id="modal-settings" class="modal hidden" role="dialog" aria-labelledby="settings-title">
      <div class="modal-backdrop" data-close="settings"></div>
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-head-row">
          <div>
            <p class="modal-kicker">密钥 · DESIGN BY ZEN</p>
            <h2 id="settings-title">接通灵感</h2>
          </div>
          <span class="modal-badge">仅本机</span>
        </div>
        <p class="modal-hint">
          密钥只存在本机。DeepSeek 官方 API <strong>不能直接看图</strong>，本应用会先本地读字再交给
          DeepSeek 分类翻译。
        </p>
        <div class="preset-row" id="provider-presets">
          <button type="button" class="preset-btn" data-preset="deepseek">DeepSeek</button>
          <button type="button" class="preset-btn" data-preset="xai">xAI</button>
          <button type="button" class="preset-btn" data-preset="openai">OpenAI</button>
        </div>
        <form id="form-settings" class="form">
          <label class="field field-primary">
            <span>API 密钥 <em>必填</em></span>
            <input type="password" id="cfg-api-key" placeholder="sk-…" autocomplete="off" />
          </label>
          <label class="field">
            <span>接口地址 Base URL</span>
            <input type="url" id="cfg-base-url" placeholder="https://api.deepseek.com" />
          </label>
          <label class="field">
            <span>模型名称</span>
            <input type="text" id="cfg-model" placeholder="deepseek-v4-flash" />
          </label>
          <label class="field">
            <span>默认货币</span>
            <select id="cfg-currency">
              <option value="auto">随菜单自动识别</option>
              <option value="USD">USD</option>
              <option value="EUR">EUR</option>
              <option value="GBP">GBP</option>
              <option value="JPY">JPY</option>
              <option value="KRW">KRW</option>
              <option value="THB">THB</option>
              <option value="AUD">AUD</option>
              <option value="CAD">CAD</option>
              <option value="SGD">SGD</option>
              <option value="HKD">HKD</option>
              <option value="TWD">TWD</option>
              <option value="CNY">CNY</option>
            </select>
          </label>
          <div class="api-test-block">
            <button type="button" class="btn-test" id="btn-test-api">试一下能否连通</button>
            <div id="api-test-result" class="api-test-result status-idle hidden" role="status"></div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn-ghost" data-close="settings">先不改</button>
            <button type="submit" class="btn-primary">记下了</button>
          </div>
        </form>
      </div>
    </div>

    <div id="toast" class="toast hidden" role="status"></div>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
