name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install & build
        env:
          # 自定义域名 zenslab.top 使用根路径；无自定义域名时才用 /仓库名/
          # 本仓库已配置 CNAME → zenslab.top，故固定为 /
          BASE_PATH: /
        run: |
          npm ci
          npm run build
      - name: Ensure CNAME in dist
        run: |
          echo "zenslab.top" > dist/CNAME
          cat dist/CNAME
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
